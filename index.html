<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Autenticação</title>
    <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tela de Login -->
    <div id="login-screen" class="glass-card">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Login</h2>
        
        <div id="login-msg" class="message-box"></div>

        <form id="login-form">
            <div class="input-group mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                <input type="text" id="login-user" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Seu nome de usuário">
            </div>

            <div class="input-group mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="login-pass" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary mb-4">Entrar</button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Não tem uma conta? 
            <a href="#" onclick="switchScreen('signup')" class="text-indigo-600 font-semibold hover:underline">Cadastre-se</a>
        </p>
    </div>

    <!-- Tela de Cadastro -->
    <div id="signup-screen" class="glass-card hidden">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Cadastro</h2>
        
        <div id="signup-msg" class="message-box"></div>

        <form id="signup-form">
            <div class="input-group mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Novo Usuário</label>
                <input type="text" id="signup-user" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Escolha um usuário">
            </div>

            <div class="input-group mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="signup-pass" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Mínimo 4 caracteres">
            </div>

            <button type="submit" class="btn-primary mb-4">Criar Conta</button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Já possui conta? 
            <a href="#" onclick="switchScreen('login')" class="text-indigo-600 font-semibold hover:underline">Fazer Login</a>
        </p>
    </div>

    <!-- Tela de Boas-vindas (Pós-login) -->
    <div id="welcome-screen" class="glass-card hidden">
        <h2 class="text-3xl font-bold text-gray-800 mb-2 text-center">Bem-vindo!</h2>
        <p class="text-center text-gray-600 mb-6">Você está logado como <span id="display-user" class="font-bold text-indigo-600"></span></p>
        
        <button onclick="logout()" class="w-full border-2 border-gray-300 text-gray-600 font-semibold py-2 rounded-md hover:bg-gray-100 transition-colors">
            Sair do Sistema
        </button>
    </div>

    <script src="/index.js"></script>
</body>
</html>
